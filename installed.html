<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudLyrics — You're all set</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #ff5500;
      --orange-dim: rgba(255, 85, 0, 0.12);
      --orange-glow: rgba(255, 85, 0, 0.3);
      --bg: #0a0a0a;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f0f0f0;
      --text-muted: rgba(255, 255, 255, 0.45);
      --text-dim: rgba(255, 255, 255, 0.22);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      overflow: hidden;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(255,85,0,0.09) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
      animation: glow-breathe 4s ease-in-out infinite;
    }

    @keyframes glow-breathe {
      0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
      50%       { opacity: 1;   transform: translateX(-50%) scale(1.08); }
    }

    .wrap {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 480px;
      width: 100%;
      animation: fade-up 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 14px;
      color: var(--text-dim);
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 40px;
    }

    .logo-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--orange);
    }

    .check {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255, 85, 0, 0.12);
      border: 1px solid rgba(255, 85, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      animation: pop-in 0.5s 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes pop-in {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }

    .check svg {
      width: 24px;
      height: 24px;
      stroke: var(--orange);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(36px, 8vw, 56px);
      letter-spacing: -0.04em;
      line-height: 1.0;
      margin-bottom: 16px;
    }

    h1 span {
      background: linear-gradient(135deg, #ff5500 0%, #ff8c42 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      font-size: 16px;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--orange);
      color: #fff;
      font-family: 'Manrope', sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 16px 36px;
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 4px 32px var(--orange-glow);
      margin-bottom: 20px;
    }

    .cta:hover {
      background: #e64d00;
      box-shadow: 0 8px 40px rgba(255,85,0,0.5);
      transform: translateY(-1px);
    }

    .cta:active { transform: translateY(0); }

    .hint {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.6;
    }

    .hint kbd {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      vertical-align: middle;
    }

    .divider {
      width: 1px;
      height: 14px;
      background: var(--border);
      display: inline-block;
      vertical-align: middle;
      margin: 0 10px;
    }

    .track-preview {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 32px;
      text-align: left;
    }

    .track-art {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .track-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 6px;
    }

    .track-info { flex: 1; min-width: 0; }

    .track-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .play-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .play-icon svg {
      width: 10px;
      height: 10px;
      fill: #fff;
      margin-left: 1px;
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="wrap">
    <div class="logo"><span class="logo-dot"></span>CloudLyrics</div>

    <div class="check">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>

    <h1>You're all<br><span>set up.</span></h1>
    <p class="sub">CloudLyrics is installed and ready. Hit play on any SoundCloud track and press <kbd style="color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.08)">F</kbd> to go fullscreen.</p>

    <div class="track-preview">
      <div class="track-art">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <div class="track-info">
        <div class="track-title">Timeless (feat. Playboi Carti)</div>
        <div class="track-artist">The Weeknd</div>
      </div>
      <div class="play-icon">
        <svg viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12"/></svg>
      </div>
    </div>

    <a class="cta" href="https://soundcloud.com/theweeknd/timeless" target="_blank" rel="noopener">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Try it now
    </a>

    <p class="hint">Opens SoundCloud with lyrics ready to go<span class="divider"></span>Press <kbd>F</kbd> for fullscreen</p>
  </div>
</body>
</html>
